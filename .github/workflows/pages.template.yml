# GitHub Actions — Deploy to GitHub Pages
#
# PLANTILLA PARA MODS. Copia a .github/workflows/pages.yml en tu rama mod
# y ajusta la rama en `branches:` a tu mod (p.ej. "mod/tu-lore").
#
# Requiere que GitHub Pages esté configurado con "GitHub Actions" como fuente
# en Settings > Pages del repositorio.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["mod/[nombre-del-mod]"]   # ← cambiar al nombre de tu rama mod
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
